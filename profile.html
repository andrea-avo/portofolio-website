<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link href="https://fonts.cdnfonts.com/css/clear-sans" rel="stylesheet" />
    <link rel="stylesheet" href="css/profile.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-slate-50 text-slate-800 font-sans flex justify-center transition-all duration-1000"
  >
    <div class="w-full max-w-[450px] h-screen flex flex-col">
      <header
        class="pt-[35px] px-[25px] pb-[15px] grid grid-cols-[1fr_auto_1fr] items-center"
      >
        <div class="w-[22px]"></div>
        <h1 class="text-[18px] font-bold tracking-[1px] uppercase text-center">
          Profile
        </h1>
        <a
          href="index.html"
          class="justify-self-end no-underline text-slate-400 text-[20px] transition-transform duration-300 hover:rotate-90 hover:text-slate-800"
          >✕</a
        >
      </header>

      <main class="flex-1 p-[25px] flex flex-col gap-[15px]">
        <div
          class="msg-bubble bg-white py-4 px-5 text-[15px] max-w-[88%] leading-[1.6] shadow-sm border border-slate-100 animate-msg-appear"
          style="animation-delay: 0.2s"
        >
          Hey! I'm Andrea.
          <span class="block text-[10px] mt-2 text-slate-400 font-bold"
            >30/01/2026</span
          >
        </div>

        <div
          class="msg-bubble bg-white py-4 px-5 text-[15px] max-w-[88%] leading-[1.6] shadow-sm border border-slate-100 animate-msg-appear"
          style="animation-delay: 0.5s"
        >
          Let's create something awesome together.
          <span class="block text-[10px] mt-2 text-slate-400 font-bold"
            >30/01/2026</span
          >
        </div>

        <div
          class="msg-bubble bg-white py-4 px-5 text-[15px] max-w-[88%] leading-[1.6] shadow-sm border border-slate-100 animate-msg-appear"
          style="animation-delay: 0.8s"
        >
          👍
          <span class="block text-[10px] mt-2 text-slate-400 font-bold"
            >30/01/2026</span
          >
        </div>
      </main>

      <footer class="pt-5 px-[25px] pb-10">
        <div
          class="bg-white rounded-[30px] py-3.5 px-[22px] flex items-center gap-[15px] border border-slate-200"
        >
          <svg class="w-[18px] h-[18px] fill-slate-400" viewBox="0 0 24 24">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path>
          </svg>
          <div
            class="flex-1 text-[11px] font-bold text-slate-400 text-center tracking-[1px]"
          >
            © <span id="year"></span> ANDREA WEB
          </div>
          <svg class="w-[18px] h-[18px] fill-slate-400" viewBox="0 0 24 24">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"
            ></path>
            <path
              d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
            ></path>
          </svg>
        </div>
      </footer>
    </div>
    <script src="js/profile.js"></script>
  </body>
</html>
